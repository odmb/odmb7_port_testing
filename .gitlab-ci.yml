include:
  - project: 'hog/Hog'
    file: '/hog.yml'
    ref: 'Hog2026.1-1'  

variables:
        VIVADO_VERSION: 2019.2
        HOG_DEVELOP_BRANCH: 'master'

## Generic FW build rule ###
.firmware_build:
        image: vivado-git:2019.2 # Changed to local version \
        # because gitlab-registry.cern.ch/cce/docker_build/vivado:2019.2 \
        # has too old of git version for Hog
        extends: .generate_project
        variables:
                extends: .vars
                PROJECT_NAME: $CI_JOB_NAME
                HOG_ONLY_SYNTH: 0 # if 1 runs only the synthesis
        artifacts:
                when: always
                name: bitfiles
                paths:
                        - bin
                        - bit
                expire_in: never
        before_script:
                - echo "=== Before Script ==="
                - git --version


#### FW Builds ###
odmb_ucsb.5:
        extends: .firmware_build
        variables:
                extends: .vars
                PROJECT_NAME: $CI_JOB_NAME
                HOG_ONLY_SYNTH: 0 # if 1 runs only the synthesis
                VIVADO_VERSION: $VIVADO_VERSION
odmb_ucsb.7:
        extends: .firmware_build
        variables:
                extends: .vars
                PROJECT_NAME: $CI_JOB_NAME
                HOG_ONLY_SYNTH: 0 # if 1 runs only the synthesis
                VIVADO_VERSION: $VIVADO_VERSION
