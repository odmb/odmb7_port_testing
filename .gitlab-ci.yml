include:
  - project: 'hog/Hog'
    file: '/hog.yml'
    ref: 'Hog2026.1-1'  

variables:
        VIVADO_VERSION: 2019.2
        HOG_DEVELOP_BRANCH: 'develop'

debug_pipeline:
  image: gitlab-registry.cern.ch/cce/docker_build/vivado:2019.2
  stage: check
  rules:
    - when: always
  script:
    - echo "=== Pipeline Debug Info ==="
    - echo "CI_COMMIT_REF_NAME:"
    - echo $CI_COMMIT_REF_NAME
    - echo "CI_MERGE_REQUEST_TARGET_BRANCH_NAME:"
    - echo $CI_MERGE_REQUEST_TARGET_BRANCH_NAME
    - echo "HOG_DEVELOP_BRANCH:"
    - echo $HOG_DEVELOP_BRANCH
    - echo "HOG_TARGET_BRANCH:"
    - echo $HOG_TARGET_BRANCH
    - echo "CI_PIPELINE_SOURCE:"
    - echo $CI_PIPELINE_SOURCE
    - echo "CI_EXTERNAL_PULL_REQUEST_TARGET_BRANCH_NAME:"
    - echo $CI_EXTERNAL_PULL_REQUEST_TARGET_BRANCH_NAME

## Generic FW build rule ###
.firmware_build:
        image: gitlab-registry.cern.ch/cce/docker_build/vivado:2019.2
        extends: .generate_project
        variables:
                extends: .vars
                PROJECT_NAME: $CI_JOB_NAME
                HOG_ONLY_SYNTH: 0 # if 1 runs only the synthesis
        artifacts:
                when: always
                name: bitfiles
                paths:
                        - bin
                        - bit
                expire_in: never
        script:
                - yum update -y
                - yum install wget which zlib-devel perl-devel gettext -y
                - wget https://github.com/git/git/archive/v2.7.2.tar.gz -O /tmp/git.tar.gz
                - cd /tmp && tar -zxf git.tar.gz
                - cd /tmp/git-2.7.2
                - make configure
                - ./configure --prefix=/usr/local # standard way
                - make install
                - git --version


#### FW Builds ###
odmb5_ucsb_dev:
        extends: .firmware_build
        variables:
                extends: .vars
                PROJECT_NAME: $CI_JOB_NAME
                HOG_ONLY_SYNTH: 0 # if 1 runs only the synthesis
                VIVADO_VERSION: $VIVADO_VERSION
odmb7_ucsb_dev:
        extends: .firmware_build
        variables:
                extends: .vars
